<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Walkie Talkie - JSON Sincronizado</title>
    <style>
        *{user-select:none;-webkit-tap-highlight-color:transparent}
        body{margin:0;min-height:100vh;background:linear-gradient(135deg,#0a0a0f,#1a1a2e);font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;padding:20px}
        .container{max-width:500px;width:100%}
        .walkie{background:#2c2c3e;border-radius:40px;padding:25px;box-shadow:0 20px 40px rgba(0,0,0,.5)}
        h1{text-align:center;color:#ff6b6b;margin:0;font-size:1.6rem}
        .subtitle{text-align:center;color:#2ed573;font-size:.7rem;margin-bottom:20px}
        
        .ids-panel{background:#0a0a0f;border-radius:15px;padding:12px;margin-bottom:20px}
        .id-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:.7rem}
        .id-label{color:#888}
        .id-value{color:#2ed573;font-family:monospace;word-break:break-all}
        
        .walkies{display:flex;gap:15px;margin-bottom:20px}
        .walkie-card{flex:1;text-align:center;padding:15px;background:#1e1e2a;border-radius:20px;cursor:pointer;border:2px solid transparent}
        .walkie-card.selected{border-color:#2ed573;background:#2ed57322}
        .walkie-num{font-size:2rem;font-weight:bold}
        .walkie-status{font-size:.7rem;margin-top:5px}
        .walkie-id-peque{font-size:.6rem;color:#2ed573;margin-top:5px;word-break:break-all}
        
        .botonera{display:flex;gap:10px;margin-bottom:10px}
        .botonera button{flex:1;padding:12px;border:none;border-radius:12px;color:white;font-weight:bold;cursor:pointer}
        .reset{background:#ffa502}
        .modo{background:#2ed573}
        
        .ptt-btn{width:180px;height:180px;border-radius:50%;background:radial-gradient(#e74c3c,#c0392b);border:4px solid #ecf0f1;cursor:pointer;margin:20px auto;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:1.2rem;font-weight:bold;color:white}
        .ptt-btn:active{transform:scale(.96)}
        .ptt-btn.disabled{opacity:0.5;pointer-events:none}
        
        .estado{text-align:center;margin-top:10px;padding:8px;border-radius:10px;font-size:.8rem}
        .verde{background:#2ed57322;color:#2ed573}
        .rojo{background:#ff475722;color:#ff4757}
        .info{font-size:.7rem;color:#888;text-align:center;margin-top:15px}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#2ed573;color:#0a0a0f;padding:10px 20px;border-radius:30px;font-size:.8rem;z-index:1000}
    </style>
</head>
<body>
<div class="container">
    <div class="walkie">
        <h1>📞 WALKIE</h1>
        <div class="subtitle">IDs sincronizados por JSON (GitHub)</div>

        <div class="ids-panel">
            <div class="id-row">
                <span class="id-label">📻 Walkie 1 ID:</span>
                <span class="id-value" id="mostrarId1">Cargando...</span>
            </div>
            <div class="id-row">
                <span class="id-label">📻 Walkie 2 ID:</span>
                <span class="id-value" id="mostrarId2">Cargando...</span>
            </div>
        </div>

        <div class="walkies">
            <div class="walkie-card" id="card1">
                <div class="walkie-num">📻 1</div>
                <div class="walkie-status" id="status1">Libre</div>
                <div class="walkie-id-peque" id="id1peque">---</div>
            </div>
            <div class="walkie-card" id="card2">
                <div class="walkie-num">📻 2</div>
                <div class="walkie-status" id="status2">Libre</div>
                <div class="walkie-id-peque" id="id2peque">---</div>
            </div>
        </div>

        <div class="botonera">
            <button id="resetBtn" class="reset">🔄 RESET (nuevos IDs)</button>
            <button id="modoBtn" class="modo">📻 MODO PTT</button>
        </div>

        <div id="ptt" class="ptt-btn disabled">🎧<br>ESPERANDO</div>

        <div id="estado" class="estado rojo">⚡ Sin conectar</div>
        <div class="info">Los IDs se sincronizan vía GitHub. Todos los dispositivos ven los mismos.</div>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// ============ TOKEN CAMUFLADO ============
const TOKEN_CAMUFLADO = "sexta_aBcDeFgHiJkLmNoPqRsTuVwXyZ12345hola";

function obtenerTokenReal() {
    return TOKEN_CAMUFLADO
        .replace("sexta_", "ghp_")
        .replace("hola", "");
}

const GITHUB_TOKEN = obtenerTokenReal();
const GITHUB_OWNER = 'TU_USUARIO';
const GITHUB_REPO = 'walkie-test';

console.log("✅ Token cargado");

// ============ VARIABLES GLOBALES ============
let idWalkie1 = null;
let idWalkie2 = null;
let peer = null;
let miId = null;
let miWalkie = null;
let stream = null;
let llamada = null;
let audio = null;
let otroId = null;
let hablando = false;
let modoPtt = true;
let intervaloLectura = null;

// ============ FUNCIONES GITHUB ============
async function leerJSON() {
    try {
        const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/walkie_config.json`;
        const res = await fetch(url, {
            headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
        });
        
        if (res.status === 404) {
            // El archivo no existe, crearlo
            return null;
        }
        
        if (!res.ok) {
            throw new Error('Error al leer');
        }
        
        const data = await res.json();
        const contenido = JSON.parse(atob(data.content));
        return contenido;
    } catch(e) {
        console.error('Error leyendo JSON:', e);
        return null;
    }
}

async function guardarJSON(walkie1_id, walkie2_id) {
    try {
        // Primero leer para obtener el sha si existe
        let sha = null;
        try {
            const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/walkie_config.json`;
            const res = await fetch(url, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            if (res.ok) {
                const data = await res.json();
                sha = data.sha;
            }
        } catch(e) {}
        
        const contenido = {
            walkie1_id: walkie1_id,
            walkie2_id: walkie2_id,
            ultimaActualizacion: Date.now()
        };
        
        const contenidoBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(contenido, null, 2))));
        
        const body = {
            message: 'Actualizar IDs walkie',
            content: contenidoBase64,
            sha: sha
        };
        
        const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/walkie_config.json`;
        const res = await fetch(url, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${GITHUB_TOKEN}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
        });
        
        if (res.ok) {
            console.log('✅ JSON guardado');
            return true;
        } else {
            console.error('Error guardando:', await res.text());
            return false;
        }
    } catch(e) {
        console.error('Error guardando JSON:', e);
        return false;
    }
}

async function inicializarIDs() {
    // Leer JSON de GitHub
    let datos = await leerJSON();
    
    if (!datos || !datos.walkie1_id || !datos.walkie2_id) {
        // No existen, crearlos
        idWalkie1 = 'w1_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
        idWalkie2 = 'w2_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
        await guardarJSON(idWalkie1, idWalkie2);
        mostrarToast('✅ IDs creados y guardados en GitHub');
    } else {
        idWalkie1 = datos.walkie1_id;
        idWalkie2 = datos.walkie2_id;
        mostrarToast('✅ IDs cargados desde GitHub');
    }
    
    // Mostrar en pantalla
    document.getElementById('mostrarId1').innerText = idWalkie1;
    document.getElementById('mostrarId2').innerText = idWalkie2;
    document.getElementById('id1peque').innerText = idWalkie1.substring(0, 14) + '...';
    document.getElementById('id2peque').innerText = idWalkie2.substring(0, 14) + '...';
}

async function resetIDs() {
    idWalkie1 = 'w1_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
    idWalkie2 = 'w2_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
    await guardarJSON(idWalkie1, idWalkie2);
    
    // Actualizar pantalla
    document.getElementById('mostrarId1').innerText = idWalkie1;
    document.getElementById('mostrarId2').innerText = idWalkie2;
    document.getElementById('id1peque').innerText = idWalkie1.substring(0, 14) + '...';
    document.getElementById('id2peque').innerText = idWalkie2.substring(0, 14) + '...';
    
    mostrarToast('✅ IDs reseteados y guardados en GitHub');
    
    // Recargar peer si estaba conectado
    if (miWalkie) {
        const idFijo = miWalkie === 1 ? idWalkie1 : idWalkie2;
        const otroNum = miWalkie === 1 ? 2 : 1;
        otroId = otroNum === 1 ? idWalkie1 : idWalkie2;
        iniciarPeer(idFijo);
    }
}

// Sincronizar periódicamente (cada 5 segundos)
async function sincronizarIDs() {
    const datos = await leerJSON();
    if (datos && datos.walkie1_id && datos.walkie2_id) {
        if (datos.walkie1_id !== idWalkie1 || datos.walkie2_id !== idWalkie2) {
            idWalkie1 = datos.walkie1_id;
            idWalkie2 = datos.walkie2_id;
            document.getElementById('mostrarId1').innerText = idWalkie1;
            document.getElementById('mostrarId2').innerText = idWalkie2;
            document.getElementById('id1peque').innerText = idWalkie1.substring(0, 14) + '...';
            document.getElementById('id2peque').innerText = idWalkie2.substring(0, 14) + '...';
            mostrarToast('🔄 IDs sincronizados desde GitHub');
            
            // Reconectar si estaba activo
            if (miWalkie) {
                const idFijo = miWalkie === 1 ? idWalkie1 : idWalkie2;
                const otroNum = miWalkie === 1 ? 2 : 1;
                otroId = otroNum === 1 ? idWalkie1 : idWalkie2;
                iniciarPeer(idFijo);
            }
        }
    }
}

function mostrarToast(mensaje) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = mensaje;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

// ============ PEERJS ============
function iniciarPeer(idFijo) {
    if (peer) peer.destroy();
    
    peer = new Peer(idFijo, { host: '0.peerjs.com', port: 443, secure: true });
    
    peer.on('open', (id) => {
        miId = id;
        document.getElementById('estado').innerHTML = `✅ Walkie ${miWalkie === 1 ? '1' : '2'} listo`;
        document.getElementById('estado').className = 'estado verde';
        document.getElementById('ptt').classList.remove('disabled');
    });
    
    peer.on('call', (call) => {
        if (stream) call.answer(stream);
        call.on('stream', (s) => {
            if (audio) audio.pause();
            audio = new Audio();
            audio.srcObject = s;
            audio.autoplay = true;
        });
    });
    
    peer.on('error', (err) => {
        console.log('Error:', err);
        if (err.type === 'unavailable-id') {
            document.getElementById('estado').innerHTML = '⚠️ Walkie ocupado. Elige el otro.';
            document.getElementById('estado').className = 'estado rojo';
        }
    });
}

// ============ SELECCIONAR WALKIE ============
function seleccionarWalkie(num) {
    if (miWalkie === num) return;
    
    miWalkie = num;
    const idFijo = num === 1 ? idWalkie1 : idWalkie2;
    const otroNum = num === 1 ? 2 : 1;
    otroId = otroNum === 1 ? idWalkie1 : idWalkie2;
    
    document.getElementById('card1').classList.remove('selected');
    document.getElementById('card2').classList.remove('selected');
    document.getElementById(`card${num}`).classList.add('selected');
    
    document.getElementById('estado').innerHTML = `⏳ Conectando al Walkie ${otroNum}...`;
    document.getElementById('estado').className = 'estado rojo';
    
    iniciarPeer(idFijo);
}

document.getElementById('card1').onclick = () => seleccionarWalkie(1);
document.getElementById('card2').onclick = () => seleccionarWalkie(2);
document.getElementById('resetBtn').onclick = () => resetIDs();

// ============ MODO PTT / MANOS LIBRES ============
document.getElementById('modoBtn').onclick = () => {
    modoPtt = !modoPtt;
    const btn = document.getElementById('modoBtn');
    if (modoPtt) {
        btn.innerHTML = '📻 MODO PTT';
        if (stream) stream.getAudioTracks().forEach(t => t.enabled = false);
        hablando = false;
        ptt.style.background = 'radial-gradient(#34495e,#2c3e50)';
        ptt.innerHTML = '🎧<br>ESCUCHANDO';
    } else {
        btn.innerHTML = '🎤 MANOS LIBRES';
        if (stream && otroId) {
            stream.getAudioTracks().forEach(t => t.enabled = true);
            if (llamada) llamada.close();
            llamada = peer.call(otroId, stream);
            hablando = true;
            ptt.style.background = 'radial-gradient(#ff4757,#c0392b)';
            ptt.innerHTML = '🎤<br>HABLANDO';
        }
    }
};

// ============ PTT ============
const ptt = document.getElementById('ptt');

ptt.onmousedown = async () => {
    if (!modoPtt) return;
    if (!stream) {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch(e) {
            alert('Permite el micrófono');
            return;
        }
    }
    if (!otroId) {
        document.getElementById('estado').innerHTML = '⚠️ Primero elige un walkie';
        return;
    }
    
    stream.getAudioTracks().forEach(t => t.enabled = true);
    hablando = true;
    ptt.style.background = 'radial-gradient(#ff4757,#c0392b)';
    ptt.innerHTML = '🎤<br>HABLANDO';
    
    if (llamada) llamada.close();
    llamada = peer.call(otroId, stream);
};

ptt.onmouseup = () => {
    if (!modoPtt) return;
    if (!hablando) return;
    
    if (stream) stream.getAudioTracks().forEach(t => t.enabled = false);
    hablando = false;
    ptt.style.background = 'radial-gradient(#34495e,#2c3e50)';
    ptt.innerHTML = '🎧<br>ESCUCHANDO';
    
    if (llamada) {
        llamada.close();
        llamada = null;
    }
};

ptt.ontouchstart = (e) => { e.preventDefault(); ptt.onmousedown(); };
ptt.ontouchend = (e) => { e.preventDefault(); ptt.onmouseup(); };

// ============ INICIALIZAR ============
(async () => {
    await inicializarIDs();
    
    // Sincronizar cada 5 segundos
    intervaloLectura = setInterval(sincronizarIDs, 5000);
})();

// ============ MICRÓFONO ============
navigator.mediaDevices.getUserMedia({ audio: true })
    .then(s => {
        stream = s;
        stream.getAudioTracks().forEach(t => t.enabled = false);
    })
    .catch(() => {});

window.onbeforeunload = () => {
    if (intervaloLectura) clearInterval(intervaloLectura);
    if (stream) stream.getTracks().forEach(t => t.stop());
    if (peer) peer.destroy();
};
</script>
</body>
</html>
