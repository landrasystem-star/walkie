<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Walkie Talkie - Envío WAV (Corregido)</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0f;
            font-family: system-ui, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: #2c2c3e;
            border-radius: 40px;
            padding: 25px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            color: #ff6b6b;
            text-align: center;
            margin: 0 0 20px;
            font-size: 1.8rem;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: none;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input {
            background: #0a0a0f;
            border: 1px solid #3a3a4a;
            color: white;
            text-align: center;
        }

        button {
            background: #ff6b6b;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.97);
        }

        .id-box {
            background: #0a0a0f;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            text-align: center;
            margin: 10px 0;
            word-break: break-all;
            color: #2ed573;
            font-size: 12px;
        }

        .ptt {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(#e74c3c, #c0392b);
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
            text-align: center;
        }

        .ptt:active {
            transform: scale(0.95);
        }

        .ptt.listening {
            background: radial-gradient(#34495e, #2c3e50);
        }

        .status {
            text-align: center;
            margin-top: 15px;
            color: #aaa;
            font-size: 0.85rem;
            background: #1e1e2a;
            padding: 8px;
            border-radius: 20px;
        }

        .manos-libres {
            background: #3498db;
            margin-top: 10px;
        }

        .manos-libres.activo {
            background: #e67e22;
        }

        .alarma {
            background: #e74c3c;
        }

        .botonera {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .seccion-sonido {
            background: #1e1e2e;
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
        }

        .seccion-sonido h3 {
            color: #ffb347;
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            text-align: center;
        }

        .btn-sonido {
            background: #9b59b6;
        }

        .file-label {
            background: #2c6e9e;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: block;
            margin: 5px 0;
        }

        input[type="file"] {
            display: none;
        }

        .info-wav {
            background: #0a0a0f;
            border-radius: 10px;
            padding: 8px;
            margin-top: 10px;
            font-size: 11px;
            text-align: center;
            color: #ffb347;
            font-family: monospace;
        }
        
        .progreso {
            background: #2c3e50;
            border-radius: 20px;
            height: 25px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }
        
        .progreso-bar {
            background: #2ed573;
            width: 0%;
            height: 100%;
            transition: width 0.3s;
            text-align: center;
            color: white;
            font-size: 11px;
            line-height: 25px;
            font-weight: bold;
        }
        
        .mensaje-error {
            background: #c0392b30;
            border-left: 3px solid #c0392b;
            padding: 8px;
            margin-top: 8px;
            font-size: 11px;
            color: #ff8a7a;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📻 WALKIE TALKIE</h1>
    
    <input type="text" id="username" placeholder="Tu nombre">
    <div class="id-box" id="myId">Esperando ID...</div>
    
    <input type="text" id="otherId" placeholder="ID de la otra persona">
    <button id="connect">🔗 CONECTAR</button>
    
    <div class="botonera">
        <div id="ptt" class="ptt listening">🎤<br>PTT<br><span style="font-size:0.6rem;">Mantener</span></div>
        <button id="manosLibres" class="manos-libres">🔊 MANOS LIBRES (OFF)</button>
        <button id="alarmaBtn" class="alarma">🚨 TIMBRE / ALARMA</button>
    </div>

    <div class="seccion-sonido">
        <h3>🎵 ENVIAR WAV (CUALQUIER TAMAÑO)</h3>
        
        <label class="file-label">📁 SELECCIONAR TU WAV/MP3
            <input type="file" id="audioFile" accept="audio/*">
        </label>
        <button id="enviarAudioBtn" class="btn-sonido" disabled>📤 ENVIAR ARCHIVO</button>
        
        <div class="progreso" id="progresoDiv">
            <div class="progreso-bar" id="progresoBar">0%</div>
        </div>
        
        <div class="info-wav" id="infoWav">
            💡 Los archivos grandes se dividen automáticamente en partes
        </div>
        <div class="mensaje-error" id="mensajeError"></div>
    </div>
    
    <div class="status" id="status">📡 Desconectado</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
    // ============================================
    // CONFIGURACIÓN
    // ============================================
    const TAMANO_CACHO = 200000; // 200KB por cacho (seguro)
    
    let peer = null;
    let localStream = null;
    let call = null;
    let audio = null;
    let connected = false;
    let manosLibresActivo = false;
    let miNombre = '';
    let dataChannel = null;
    let archivoSeleccionado = null;
    
    // Para reconstruir archivo en el receptor
    let recibiendoArchivo = false;
    let cachosRecibidos = [];
    let nombreArchivoRecibido = '';
    let tipoArchivoRecibido = '';
    let totalCachosEsperados = 0;
    
    // DOM elements
    const usernameInput = document.getElementById('username');
    const myIdDiv = document.getElementById('myId');
    const otherIdInput = document.getElementById('otherId');
    const connectBtn = document.getElementById('connect');
    const ptt = document.getElementById('ptt');
    const manosLibresBtn = document.getElementById('manosLibres');
    const alarmaBtn = document.getElementById('alarmaBtn');
    const statusSpan = document.getElementById('status');
    const audioFileInput = document.getElementById('audioFile');
    const enviarAudioBtn = document.getElementById('enviarAudioBtn');
    const progresoDiv = document.getElementById('progresoDiv');
    const progresoBar = document.getElementById('progresoBar');
    const infoWav = document.getElementById('infoWav');
    const mensajeError = document.getElementById('mensajeError');
    
    function mostrarError(texto) {
        mensajeError.style.display = 'block';
        mensajeError.innerHTML = `❌ ${texto}`;
        setTimeout(() => {
            mensajeError.style.display = 'none';
        }, 5000);
    }
    
    // ========== SONIDOS ==========
    function sonarAlarmaReceptor() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.35;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8);
            osc.stop(audioCtx.currentTime + 0.8);
            audioCtx.resume();
        } catch(e) {}
    }
    
    function enviarAlarma() {
        if (dataChannel && dataChannel.readyState === 'open') {
            dataChannel.send(JSON.stringify({ type: 'ALARMA' }));
            statusSpan.innerHTML = '🚨 ¡ALARMA ENVIADA!';
            setTimeout(() => { if(connected) statusSpan.innerHTML = '✅ Conectado'; }, 1500);
        } else {
            mostrarError('No hay conexión activa');
        }
    }
    
    // ========== ENVIAR ARCHIVO DIVIDIDO (CORREGIDO) ==========
    async function enviarArchivoDividido(file) {
        if (!connected || !dataChannel || dataChannel.readyState !== 'open') {
            mostrarError('No estás conectado al otro walkie');
            return false;
        }
        
        if (!file) {
            mostrarError('No hay archivo seleccionado');
            return false;
        }
        
        progresoDiv.style.display = 'block';
        progresoBar.style.width = '0%';
        progresoBar.innerHTML = '0%';
        
        try {
            // Leer el archivo completo
            const arrayBuffer = await file.arrayBuffer();
            const totalBytes = arrayBuffer.byteLength;
            const totalCachos = Math.ceil(totalBytes / TAMANO_CACHO);
            const tamañoKB = (totalBytes / 1024).toFixed(1);
            
            statusSpan.innerHTML = `📤 Enviando "${file.name}" (${tamañoKB} KB) en ${totalCachos} partes...`;
            infoWav.innerHTML = `📦 Enviando: parte 1 de ${totalCachos}`;
            
            // 1. Enviar METADATOS
            const metadata = {
                type: 'METADATOS_AUDIO',
                nombre: file.name,
                mime: file.type || 'audio/wav',
                totalCachos: totalCachos,
                totalBytes: totalBytes
            };
            dataChannel.send(JSON.stringify(metadata));
            
            // Pequeña pausa
            await new Promise(r => setTimeout(r, 100));
            
            // 2. Enviar cada cacho
            for (let i = 0; i < totalCachos; i++) {
                const inicio = i * TAMANO_CACHO;
                const fin = Math.min(inicio + TAMANO_CACHO, totalBytes);
                const cacho = arrayBuffer.slice(inicio, fin);
                
                // Convertir a Base64
                const uint8Array = new Uint8Array(cacho);
                let binary = '';
                for (let j = 0; j < uint8Array.length; j++) {
                    binary += String.fromCharCode(uint8Array[j]);
                }
                const base64Cacho = btoa(binary);
                
                const mensajeCacho = {
                    type: 'CACHO_AUDIO',
                    indice: i,
                    totalCachos: totalCachos,
                    datos: base64Cacho
                };
                
                dataChannel.send(JSON.stringify(mensajeCacho));
                
                // Actualizar progreso
                const porcentaje = Math.round(((i + 1) / totalCachos) * 100);
                progresoBar.style.width = `${porcentaje}%`;
                progresoBar.innerHTML = `${porcentaje}%`;
                infoWav.innerHTML = `📦 Enviando: parte ${i+1} de ${totalCachos} (${porcentaje}%)`;
                
                // Pequeña pausa para no saturar
                await new Promise(r => setTimeout(r, 10));
            }
            
            statusSpan.innerHTML = `✅ "${file.name}" enviado completo (${totalCachos} partes)`;
            infoWav.innerHTML = `✅ Envío completado! El otro walkie lo recibió`;
            setTimeout(() => {
                progresoDiv.style.display = 'none';
                if(connected) statusSpan.innerHTML = '✅ Conectado';
                infoWav.innerHTML = `💡 Los archivos grandes se dividen automáticamente`;
            }, 3000);
            return true;
            
        } catch(err) {
            console.error('Error:', err);
            mostrarError(`Error al enviar: ${err.message}`);
            progresoDiv.style.display = 'none';
            return false;
        }
    }
    
    // ========== RECIBIR Y REENSAMBLAR ==========
    function procesarCachoRecibido(datos) {
        try {
            if (datos.type === 'METADATOS_AUDIO') {
                // Iniciar nueva recepción
                recibiendoArchivo = true;
                cachosRecibidos = [];
                nombreArchivoRecibido = datos.nombre;
                tipoArchivoRecibido = datos.mime;
                totalCachosEsperados = datos.totalCachos;
                statusSpan.innerHTML = `📥 Recibiendo "${datos.nombre}" (${datos.totalCachos} partes)...`;
                infoWav.innerHTML = `📥 Recibiendo archivo de ${datos.totalCachos} partes...`;
            }
            else if (datos.type === 'CACHO_AUDIO') {
                if (!recibiendoArchivo) return;
                
                // Guardar el cacho
                cachosRecibidos[datos.indice] = datos.datos;
                
                // Calcular progreso
                const recibidos = cachosRecibidos.filter(c => c !== undefined && c !== null).length;
                const porcentaje = Math.round((recibidos / totalCachosEsperados) * 100);
                statusSpan.innerHTML = `📥 Recibiendo... ${porcentaje}% (${recibidos}/${totalCachosEsperados})`;
                infoWav.innerHTML = `📥 Recibiendo parte ${recibidos}/${totalCachosEsperados}`;
                
                // ¿Completo?
                if (recibidos === totalCachosEsperados) {
                    // Reensamblar
                    try {
                        let todosLosDatos = '';
                        for (let i = 0; i < totalCachosEsperados; i++) {
                            todosLosDatos += cachosRecibidos[i];
                        }
                        
                        // Convertir de Base64
                        const binaryString = atob(todosLosDatos);
                        const bytes = new Uint8Array(binaryString.length);
                        for (let i = 0; i < binaryString.length; i++) {
                            bytes[i] = binaryString.charCodeAt(i);
                        }
                        
                        // Crear blob y reproducir
                        const blob = new Blob([bytes], { type: tipoArchivoRecibido });
                        const url = URL.createObjectURL(blob);
                        const audioElem = new Audio(url);
                        audioElem.volume = 0.9;
                        audioElem.play().catch(e => console.log("Error:", e));
                        
                        statusSpan.innerHTML = `🔊 REPRODUCIENDO: ${nombreArchivoRecibido}`;
                        infoWav.innerHTML = `✅ Audio recibido y reproducido: ${nombreArchivoRecibido}`;
                        
                        setTimeout(() => {
                            if(connected) statusSpan.innerHTML = '✅ Conectado';
                        }, 3000);
                        
                        // Limpiar
                        recibiendoArchivo = false;
                        cachosRecibidos = [];
                        
                    } catch(e) {
                        console.error("Error reensamblando:", e);
                        mostrarError(`Error al reensamblar: ${e.message}`);
                        recibiendoArchivo = false;
                    }
                }
            }
        } catch(e) {
            console.error("Error procesando cacho:", e);
        }
    }
    
    // ========== PEERJS ==========
    peer = new Peer({ host: '0.peerjs.com', port: 443, secure: true });
    
    peer.on('open', id => {
        myIdDiv.innerHTML = `📱 TU ID: ${id}<br>📛 ${miNombre || 'Sin nombre'}`;
        statusSpan.innerHTML = '✅ Listo. Comparte este ID';
    });
    
    peer.on('call', incoming => {
        if (localStream) {
            incoming.answer(localStream);
            configurarLlamada(incoming);
        }
    });
    
    peer.on('error', err => {
        console.error(err);
        mostrarError('Error de conexión PeerJS');
    });
    
    // Micrófono
    navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true } })
        .then(stream => { localStream = stream; })
        .catch(e => { mostrarError('Permiso de micrófono denegado'); });
    
    function configurarLlamada(c) {
        call = c;
        connected = true;
        statusSpan.innerHTML = '✅ Conectado - Escuchando';
        
        // Canal de datos
        if (c.peerConnection) {
            c.peerConnection.ondatachannel = (event) => {
                dataChannel = event.channel;
                dataChannel.onmessage = (e) => manejarMensaje(e);
            };
        }
        
        if (c.dataChannel) {
            dataChannel = c.dataChannel;
            dataChannel.onmessage = (e) => manejarMensaje(e);
        } else {
            try {
                const dc = c.peerConnection.createDataChannel('walkieCanal');
                dc.onmessage = (e) => manejarMensaje(e);
                dataChannel = dc;
            } catch(e) { console.log("Error:", e); }
        }
        
        c.on('stream', stream => {
            if (audio) audio.pause();
            audio = new Audio();
            audio.srcObject = stream;
            audio.autoplay = true;
        });
        
        c.on('close', () => {
            connected = false;
            statusSpan.innerHTML = '❌ Desconectado';
            dataChannel = null;
            if (manosLibresActivo) {
                manosLibresActivo = false;
                manosLibresBtn.innerHTML = '🔊 MANOS LIBRES (OFF)';
                manosLibresBtn.classList.remove('activo');
                if (localStream) localStream.getTracks().forEach(t => t.enabled = false);
            }
            ptt.classList.add('listening');
            ptt.innerHTML = '🎤<br>PTT';
        });
    }
    
    function manejarMensaje(event) {
        try {
            const msg = JSON.parse(event.data);
            if (msg.type === 'ALARMA') {
                sonarAlarmaReceptor();
                statusSpan.innerHTML = '🚨 ¡ALARMA RECIBIDA!';
                setTimeout(() => { if(connected) statusSpan.innerHTML = '✅ Conectado'; }, 1500);
            } else if (msg.type === 'METADATOS_AUDIO' || msg.type === 'CACHO_AUDIO') {
                procesarCachoRecibido(msg);
            }
        } catch(e) {
            // No es JSON, ignorar
        }
    }
    
    // ========== UI ==========
    
    connectBtn.onclick = () => {
        const otherId = otherIdInput.value.trim();
        if (!otherId) { mostrarError('Escribe el ID del otro walkie'); return; }
        if (!localStream) { mostrarError('Esperando permiso de micrófono...'); return; }
        statusSpan.innerHTML = '🔄 Conectando...';
        const c = peer.call(otherId, localStream);
        configurarLlamada(c);
    };
    
    usernameInput.onchange = () => {
        miNombre = usernameInput.value.trim();
        if (miNombre && peer && peer.id) {
            myIdDiv.innerHTML = `📱 TU ID: ${peer.id}<br>📛 ${miNombre}`;
        }
    };
    
    // PTT
    ptt.onmousedown = () => {
        if (connected && localStream && !manosLibresActivo) {
            localStream.getTracks().forEach(t => t.enabled = true);
            ptt.classList.remove('listening');
            ptt.innerHTML = '🔴<br>HABLANDO';
            statusSpan.innerHTML = '🔴 Transmitiendo...';
        }
    };
    ptt.onmouseup = () => {
        if (!manosLibresActivo && localStream) {
            localStream.getTracks().forEach(t => t.enabled = false);
            ptt.classList.add('listening');
            ptt.innerHTML = '🎤<br>PTT';
            statusSpan.innerHTML = '🎧 Escuchando';
        }
    };
    ptt.onmouseleave = ptt.onmouseup;
    ptt.ontouchstart = (e) => { e.preventDefault(); ptt.onmousedown(); };
    ptt.ontouchend = (e) => { e.preventDefault(); ptt.onmouseup(); };
    
    // Manos libres
    manosLibresBtn.onclick = () => {
        if (!connected) { mostrarError('Conecta primero'); return; }
        manosLibresActivo = !manosLibresActivo;
        if (manosLibresActivo) {
            if (localStream) localStream.getTracks().forEach(t => t.enabled = true);
            manosLibresBtn.innerHTML = '🎙️ MANOS LIBRES (ON)';
            manosLibresBtn.classList.add('activo');
            statusSpan.innerHTML = '🎤 Manos libres activado';
        } else {
            if (localStream) localStream.getTracks().forEach(t => t.enabled = false);
            manosLibresBtn.innerHTML = '🔊 MANOS LIBRES (OFF)';
            manosLibresBtn.classList.remove('activo');
            statusSpan.innerHTML = '🎧 Modo PTT';
        }
    };
    
    // Alarma
    alarmaBtn.onclick = () => {
        if (connected) enviarAlarma();
        else mostrarError('No estás conectado');
    };
    
    // Envío de WAV
    audioFileInput.onchange = (e) => {
        if (e.target.files.length > 0) {
            archivoSeleccionado = e.target.files[0];
            const tamañoKB = (archivoSeleccionado.size / 1024).toFixed(1);
            const cachos = Math.ceil(archivoSeleccionado.size / TAMANO_CACHO);
            enviarAudioBtn.disabled = false;
            statusSpan.innerHTML = `📁 ${archivoSeleccionado.name} (${tamañoKB} KB) → ${cachos} partes`;
            infoWav.innerHTML = `📦 Archivo listo: ${cachos} partes. Presiona "ENVIAR"`;
        }
    };
    
    enviarAudioBtn.onclick = async () => {
        if (!connected) { mostrarError('Conecta primero al otro walkie'); return; }
        if (archivoSeleccionado) {
            await enviarArchivoDividido(archivoSeleccionado);
        } else {
            mostrarError('Selecciona un archivo WAV o MP3 primero');
        }
    };
    
    // Inicializar
    usernameInput.value = 'WalkieUser';
    miNombre = 'WalkieUser';
    
    window.onbeforeunload = () => {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (peer) peer.destroy();
    };
</script>
</body>
</html>
