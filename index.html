<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Walkie Talkie - Tu WAV</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0f;
            font-family: system-ui, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: #2c2c3e;
            border-radius: 40px;
            padding: 25px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            color: #ff6b6b;
            text-align: center;
            margin: 0 0 20px;
            font-size: 1.8rem;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: none;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input {
            background: #0a0a0f;
            border: 1px solid #3a3a4a;
            color: white;
            text-align: center;
        }

        button {
            background: #ff6b6b;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.05s ease;
        }

        button:active {
            transform: scale(0.97);
        }

        .id-box {
            background: #0a0a0f;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            text-align: center;
            margin: 10px 0;
            word-break: break-all;
            color: #2ed573;
            font-size: 12px;
        }

        .ptt {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(#e74c3c, #c0392b);
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .ptt:active {
            transform: scale(0.95);
        }

        .ptt.listening {
            background: radial-gradient(#34495e, #2c3e50);
        }

        .status {
            text-align: center;
            margin-top: 15px;
            color: #aaa;
            font-size: 0.85rem;
            background: #1e1e2a;
            padding: 8px;
            border-radius: 20px;
        }

        .manos-libres {
            background: #3498db;
            margin-top: 10px;
        }

        .manos-libres.activo {
            background: #e67e22;
        }

        .alarma {
            background: #e74c3c;
        }

        .botonera {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .seccion-sonido {
            background: #1e1e2e;
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
        }

        .seccion-sonido h3 {
            color: #ffb347;
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            text-align: center;
        }

        .btn-sonido {
            background: #9b59b6;
        }

        .btn-sonido-integrado {
            background: #e67e22;
            margin-bottom: 10px;
        }

        .file-label {
            background: #2c6e9e;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: block;
            margin: 5px 0;
        }

        input[type="file"] {
            display: none;
        }

        .info-wav {
            background: #0a0a0f;
            border-radius: 10px;
            padding: 8px;
            margin-top: 10px;
            font-size: 11px;
            text-align: center;
            color: #ffb347;
            font-family: monospace;
        }
        
        .error-box {
            background: #c0392b30;
            border-left: 3px solid #c0392b;
            padding: 8px;
            margin-top: 8px;
            font-size: 11px;
            color: #ff8a7a;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📻 WALKIE TALKIE</h1>
    
    <input type="text" id="username" placeholder="Tu nombre">
    <div class="id-box" id="myId">Esperando ID...</div>
    
    <input type="text" id="otherId" placeholder="ID de la otra persona">
    <button id="connect">🔗 CONECTAR</button>
    
    <div class="botonera">
        <div id="ptt" class="ptt listening">🎤<br>PTT<br><span style="font-size:0.6rem;">Mantener</span></div>
        <button id="manosLibres" class="manos-libres">🔊 MANOS LIBRES (OFF)</button>
        <button id="alarmaBtn" class="alarma">🚨 TIMBRE / ALARMA</button>
    </div>

    <div class="seccion-sonido">
        <h3>🎵 ENVIAR TU ARCHIVO WAV</h3>
        
        <!-- CAMBIA EL NOMBRE DE TU WAV AQUÍ 👇 -->
        <button id="sonidoIntegradoBtn" class="btn-sonido-integrado">📢 ENVIAR MI WAV: "sonido.wav"</button>
        
        <label class="file-label">📁 O selecciona otro archivo WAV/MP3
            <input type="file" id="audioFile" accept="audio/wav,audio/mpeg,audio/mp3,audio/*">
        </label>
        <button id="enviarAudioBtn" class="btn-sonido" disabled>📤 ENVIAR ARCHIVO SELECCIONADO</button>
        
        <div class="info-wav" id="infoWav">
            ⚙️ Configuración actual:<br>
            📄 Buscando archivo: <strong id="nombreWavBuscado">sonido.wav</strong><br>
            💡 Pon tu WAV en la MISMA CARPETA que este HTML
        </div>
        <div id="errorDetalle" class="error-box" style="display:none;"></div>
    </div>
    
    <div class="status" id="status">📡 Desconectado</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
    // ============================================
    // 👇👇👇 CAMBIA ESTO POR EL NOMBRE DE TU WAV 👇👇👇
    // ============================================
    const NOMBRE_WAV = 'sonido.wav';  // <--- PON AQUÍ EL NOMBRE DE TU ARCHIVO
    // ============================================
    
    let peer, localStream, call, audio;
    let connected = false;
    let manosLibresActivo = false;
    let miNombre = '';
    let dataChannel = null;
    let archivoSeleccionado = null;
    
    // DOM elements
    const usernameInput = document.getElementById('username');
    const myIdDiv = document.getElementById('myId');
    const otherIdInput = document.getElementById('otherId');
    const connectBtn = document.getElementById('connect');
    const ptt = document.getElementById('ptt');
    const manosLibresBtn = document.getElementById('manosLibres');
    const alarmaBtn = document.getElementById('alarmaBtn');
    const statusSpan = document.getElementById('status');
    const audioFileInput = document.getElementById('audioFile');
    const enviarAudioBtn = document.getElementById('enviarAudioBtn');
    const sonidoIntegradoBtn = document.getElementById('sonidoIntegradoBtn');
    const infoWavDiv = document.getElementById('infoWav');
    const errorDetalleDiv = document.getElementById('errorDetalle');
    
    // Mostrar nombre del WAV en la UI
    document.getElementById('nombreWavBuscado').innerText = NOMBRE_WAV;
    sonidoIntegradoBtn.innerHTML = `📢 ENVIAR MI WAV: "${NOMBRE_WAV}"`;
    
    // ========== FUNCIONES ==========
    
    function mostrarError(mensaje) {
        errorDetalleDiv.style.display = 'block';
        errorDetalleDiv.innerHTML = `❌ ${mensaje}`;
        setTimeout(() => {
            errorDetalleDiv.style.display = 'none';
        }, 5000);
    }
    
    // Alarma que suena SOLO en el walkie que RECIBE
    function sonarAlarmaReceptor() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.35;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8);
            osc.stop(audioCtx.currentTime + 0.8);
            audioCtx.resume();
        } catch(e) { console.log("Alarma error:", e); }
    }
    
    function enviarAlarma() {
        if (dataChannel && dataChannel.readyState === 'open') {
            dataChannel.send(JSON.stringify({ type: 'ALARMA' }));
            statusSpan.innerHTML = '🚨 ¡ALARMA ENVIADA al otro walkie!';
            setTimeout(() => { if(connected) statusSpan.innerHTML = '✅ Conectado'; }, 2000);
        } else {
            statusSpan.innerHTML = '⚠️ No hay conexión activa';
        }
    }
    
    // Enviar archivo de audio
    async function enviarArchivoAudio(blob, nombreArchivo) {
        if (!connected || !dataChannel || dataChannel.readyState !== 'open') {
            statusSpan.innerHTML = '⚠️ No estás conectado al otro walkie';
            return false;
        }
        
        try {
            statusSpan.innerHTML = `📤 Enviando "${nombreArchivo}" (${(blob.size/1024).toFixed(1)} KB)...`;
            
            // Leer el archivo y convertirlo a Base64
            const reader = new FileReader();
            
            const resultado = await new Promise((resolve, reject) => {
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(new Error('Error al leer el archivo'));
                reader.readAsDataURL(blob);
            });
            
            // resultado es algo como: "data:audio/wav;base64,XXXXX"
            const base64 = resultado.split(',')[1];
            
            const mensaje = JSON.stringify({
                type: 'AUDIO',
                nombre: nombreArchivo,
                data: base64,
                mime: blob.type || 'audio/wav'
            });
            
            dataChannel.send(mensaje);
            statusSpan.innerHTML = `✅ "${nombreArchivo}" enviado correctamente`;
            setTimeout(() => { if(connected) statusSpan.innerHTML = '✅ Conectado'; }, 2000);
            return true;
            
        } catch(err) {
            console.error(err);
            statusSpan.innerHTML = `❌ Error al enviar: ${err.message}`;
            return false;
        }
    }
    
    // Reproducir audio recibido
    function reproducirAudioRecibido(base64, mimeType, nombre) {
        try {
            const audio = new Audio();
            audio.src = `data:${mimeType || 'audio/wav'};base64,${base64}`;
            audio.volume = 0.9;
            audio.play().catch(e => console.log("Error reproducción:", e));
            statusSpan.innerHTML = `🔊 Reproduciendo: ${nombre}`;
            setTimeout(() => { if(connected) statusSpan.innerHTML = '✅ Conectado'; }, 2500);
        } catch(e) {
            console.error("Error reproduciendo audio:", e);
            mostrarError(`No se pudo reproducir: ${e.message}`);
        }
    }
    
    // ========== PEERJS ==========
    peer = new Peer({ host: '0.peerjs.com', port: 443, secure: true });
    
    peer.on('open', id => {
        myIdDiv.innerHTML = `📱 TU ID: ${id}<br>📛 ${miNombre || 'Sin nombre'}`;
        statusSpan.innerHTML = '✅ Listo. Comparte este ID';
    });
    
    peer.on('call', incoming => {
        if (localStream) {
            incoming.answer(localStream);
            setupCall(incoming);
        }
    });
    
    peer.on('error', err => {
        console.error(err);
        statusSpan.innerHTML = '❌ Error de conexión PeerJS';
    });
    
    // Obtener micrófono
    navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } })
        .then(stream => { localStream = stream; })
        .catch(e => { 
            console.log('Error micrófono:', e); 
            statusSpan.innerHTML = '❌ Permiso de micrófono denegado';
        });
    
    function setupCall(c) {
        call = c;
        connected = true;
        statusSpan.innerHTML = '✅ Conectado - Escuchando';
        
        // Configurar canal de datos
        if (c.peerConnection) {
            c.peerConnection.ondatachannel = (event) => {
                dataChannel = event.channel;
                dataChannel.onmessage = (e) => manejarMensajeCanal(e);
            };
        }
        
        if (c.dataChannel) {
            dataChannel = c.dataChannel;
            dataChannel.onmessage = (e) => manejarMensajeCanal(e);
        } else {
            try {
                const dc = c.peerConnection.createDataChannel('walkieChannel');
                dc.onmessage = (e) => manejarMensajeCanal(e);
                dataChannel = dc;
            } catch(e) { console.log("Error creando canal:", e); }
        }
        
        c.on('stream', stream => {
            if (audio) audio.pause();
            audio = new Audio();
            audio.srcObject = stream;
            audio.autoplay = true;
        });
        
        c.on('close', () => {
            connected = false;
            statusSpan.innerHTML = '❌ Desconectado';
            dataChannel = null;
            if (manosLibresActivo) {
                manosLibresActivo = false;
                manosLibresBtn.innerHTML = '🔊 MANOS LIBRES (OFF)';
                manosLibresBtn.classList.remove('activo');
                if (localStream) localStream.getTracks().forEach(t => t.enabled = false);
            }
            ptt.classList.add('listening');
            ptt.innerHTML = '🎤<br>PTT<br><span style="font-size:0.6rem;">Mantener</span>';
        });
    }
    
    function manejarMensajeCanal(event) {
        try {
            const msg = JSON.parse(event.data);
            if (msg.type === 'ALARMA') {
                sonarAlarmaReceptor();
                statusSpan.innerHTML = '🚨 ¡ALARMA RECIBIDA!';
                setTimeout(() => { if(connected) statusSpan.innerHTML = '✅ Conectado'; }, 1500);
            } else if (msg.type === 'AUDIO') {
                reproducirAudioRecibido(msg.data, msg.mime, msg.nombre);
            }
        } catch(e) {
            console.log("Mensaje no JSON:", event.data);
        }
    }
    
    // ========== CONTROLES UI ==========
    
    connectBtn.onclick = () => {
        const otherId = otherIdInput.value.trim();
        if (!otherId) { alert('Escribe el ID del otro walkie'); return; }
        if (!localStream) { alert('Esperando permiso de micrófono...'); return; }
        statusSpan.innerHTML = '🔄 Conectando...';
        const c = peer.call(otherId, localStream);
        setupCall(c);
    };
    
    usernameInput.onchange = () => {
        miNombre = usernameInput.value.trim();
        if (miNombre && peer && peer.id) {
            myIdDiv.innerHTML = `📱 TU ID: ${peer.id}<br>📛 ${miNombre}`;
        }
    };
    
    // PTT
    ptt.onmousedown = () => {
        if (connected && localStream && !manosLibresActivo) {
            localStream.getTracks().forEach(t => t.enabled = true);
            ptt.classList.remove('listening');
            ptt.innerHTML = '🔴<br>HABLANDO';
            statusSpan.innerHTML = '🔴 Transmitiendo...';
        }
    };
    ptt.onmouseup = () => {
        if (!manosLibresActivo && localStream) {
            localStream.getTracks().forEach(t => t.enabled = false);
            ptt.classList.add('listening');
            ptt.innerHTML = '🎤<br>PTT';
            statusSpan.innerHTML = '🎧 Escuchando...';
        }
    };
    ptt.onmouseleave = ptt.onmouseup;
    ptt.ontouchstart = (e) => { e.preventDefault(); ptt.onmousedown(); };
    ptt.ontouchend = (e) => { e.preventDefault(); ptt.onmouseup(); };
    
    // Manos libres
    manosLibresBtn.onclick = () => {
        if (!connected) { alert('Primero conecta con otro walkie'); return; }
        manosLibresActivo = !manosLibresActivo;
        if (manosLibresActivo) {
            if (localStream) localStream.getTracks().forEach(t => t.enabled = true);
            manosLibresBtn.innerHTML = '🎙️ MANOS LIBRES (ON)';
            manosLibresBtn.classList.add('activo');
            statusSpan.innerHTML = '🎤 Manos libres activado';
        } else {
            if (localStream) localStream.getTracks().forEach(t => t.enabled = false);
            manosLibresBtn.innerHTML = '🔊 MANOS LIBRES (OFF)';
            manosLibresBtn.classList.remove('activo');
            statusSpan.innerHTML = '🎧 Modo PTT';
        }
    };
    
    // Alarma
    alarmaBtn.onclick = () => {
        if (connected) enviarAlarma();
        else alert('No estás conectado');
    };
    
    // ========== ENVÍO DE TU WAV ==========
    
    sonidoIntegradoBtn.onclick = async () => {
        if (!connected) {
            statusSpan.innerHTML = '⚠️ Conecta primero al otro walkie';
            return;
        }
        
        statusSpan.innerHTML = `🔍 Buscando archivo "${NOMBRE_WAV}"...`;
        errorDetalleDiv.style.display = 'none';
        
        try {
            // Intentar cargar el archivo WAV
            const respuesta = await fetch(NOMBRE_WAV);
            
            if (!respuesta.ok) {
                throw new Error(`HTTP ${respuesta.status}: No se encontró el archivo "${NOMBRE_WAV}"`);
            }
            
            const blob = await respuesta.blob();
            
            if (blob.size === 0) {
                throw new Error(`El archivo "${NOMBRE_WAV}" está vacío`);
            }
            
            statusSpan.innerHTML = `📂 Cargado ${(blob.size/1024).toFixed(1)} KB - Enviando...`;
            await enviarArchivoAudio(blob, NOMBRE_WAV);
            
        } catch(err) {
            console.error(err);
            let mensajeError = '';
            
            if (err.message.includes('HTTP')) {
                mensajeError = `No encuentro "${NOMBRE_WAV}" en la misma carpeta.\n\n📁 SOLUCIÓN:\n1. Pon tu archivo WAV en la MISMA CARPETA que este HTML\n2. Asegúrate que se llame EXACTAMENTE "${NOMBRE_WAV}"\n3. Recarga la página y vuelve a intentar`;
            } else {
                mensajeError = err.message;
            }
            
            mostrarError(mensajeError);
            statusSpan.innerHTML = `❌ Error: No se pudo cargar "${NOMBRE_WAV}"`;
            infoWavDiv.innerHTML = `⚠️ <strong>ERROR:</strong> No se encuentra el archivo "${NOMBRE_WAV}"<br><br>📁 <strong>SOLUCIÓN:</strong><br>• Coloca tu archivo WAV en la MISMA CARPETA<br>• Nómbralo exactamente igual (respeta mayúsculas/minúsculas)<br>• Recarga esta página`;
        }
    };
    
    // Seleccionar archivo manual
    audioFileInput.onchange = (e) => {
        if (e.target.files.length > 0) {
            archivoSeleccionado = e.target.files[0];
            enviarAudioBtn.disabled = false;
            statusSpan.innerHTML = `📁 Listo: ${archivoSeleccionado.name} (${(archivoSeleccionado.size/1024).toFixed(1)} KB)`;
        } else {
            archivoSeleccionado = null;
            enviarAudioBtn.disabled = true;
        }
    };
    
    enviarAudioBtn.onclick = async () => {
        if (!connected) { alert('Conecta primero'); return; }
        if (archivoSeleccionado) {
            await enviarArchivoAudio(archivoSeleccionado, archivoSeleccionado.name);
        } else {
            statusSpan.innerHTML = '📁 Selecciona un archivo primero';
        }
    };
    
    // Inicializar
    usernameInput.value = 'WalkieUser';
    miNombre = 'WalkieUser';
    
    window.onbeforeunload = () => {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (peer) peer.destroy();
    };
</script>
</body>
</html>
