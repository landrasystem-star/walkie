<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Walkie Talkie - Enlace Fijo</title>
    <style>
        body{background:#0a0a0f;font-family:system-ui;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:20px}
        .container{background:#2c2c3e;border-radius:40px;padding:25px;max-width:500px;width:100%}
        h1{color:#ff6b6b;text-align:center;margin:0 0 20px}
        input,button{width:100%;padding:12px;margin:8px 0;border-radius:12px;border:none;box-sizing:border-box}
        input{background:#0a0a0f;border:1px solid #3a3a4a;color:white;text-align:center}
        button{background:#ff6b6b;color:white;font-weight:bold;cursor:pointer}
        .id-box{background:#0a0a0f;padding:12px;border-radius:12px;font-family:monospace;text-align:center;margin:10px 0;word-break:break-all;color:#2ed573;font-size:12px}
        .ptt{width:160px;height:160px;border-radius:50%;background:radial-gradient(#e74c3c,#c0392b);margin:20px auto;display:flex;align-items:center;justify-content:center;flex-direction:column;color:white;font-weight:bold;cursor:pointer;transition:0.05s linear}
        .ptt:active{transform:scale(0.96)}
        .ptt.listening{background:radial-gradient(#34495e,#2c3e50)}
        .status{text-align:center;margin-top:15px;color:#aaa}
        .manos-libres{background:#3498db;margin-top:10px}
        .manos-libres.activo{background:#e67e22}
        .alarma{background:#e74c3c;margin-top:10px}
        .botonera{display:flex;flex-direction:column;gap:10px}
    </style>
</head>
<body>
<div class="container">
    <h1>📻 WALKIE TALKIE</h1>
    
    <input type="text" id="username" placeholder="Tu nombre">
    <div class="id-box" id="myId">Esperando ID...</div>
    
    <input type="text" id="otherId" placeholder="ID de la otra persona">
    <button id="connect">🔗 CONECTAR</button>
    
    <div class="botonera">
        <div id="ptt" class="ptt listening">🎤<br>PTT (Mantener)</div>
        <button id="manosLibres" class="manos-libres">🎤 MANOS LIBRES (OFF)</button>
        <button id="alarmaBtn" class="alarma">🚨 TIMBRE / ALARMA 🚨</button>
    </div>
    
    <div class="status" id="status">Desconectado</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
    let peer, localStream, call, audio;
    let connected = false;
    let manosLibresActivo = false;
    let miNombre = '';
    
    // Sonido alarma
    function sonarAlarma() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.3;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8);
            osc.stop(audioCtx.currentTime + 0.8);
            audioCtx.resume();
        } catch(e) {}
    }
    
    function enviarAlarma() {
        if (call && call.dataChannel) {
            call.dataChannel.send('ALARMA');
        } else if (call && call.peerConnection) {
            try {
                const dc = call.peerConnection.createDataChannel('alarma');
                dc.onopen = () => dc.send('ALARMA');
                dc.onmessage = (e) => { if (e.data === 'ALARMA') sonarAlarma(); };
                call.dataChannel = dc;
            } catch(e) {}
        }
        sonarAlarma();
    }
    
    // PeerJS
    peer = new Peer({ host: '0.peerjs.com', port: 443, secure: true });
    
    peer.on('open', id => {
        document.getElementById('myId').innerHTML = `📱 TU ID: ${id}<br>📛 ${miNombre || 'Sin nombre'}`;
        document.getElementById('status').innerHTML = '✅ Listo. Comparte tu ID';
    });
    
    peer.on('call', incoming => {
        if (localStream) {
            incoming.answer(localStream);
            setupCall(incoming);
        }
    });
    
    // Micrófono
    navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true } })
        .then(stream => { localStream = stream; })
        .catch(e => console.log('Error:', e));
    
    function setupCall(c) {
        call = c;
        connected = true;
        document.getElementById('status').innerHTML = '✅ Conectado';
        
        if (c.peerConnection) {
            c.peerConnection.ondatachannel = (event) => {
                const channel = event.channel;
                channel.onmessage = (e) => {
                    if (e.data === 'ALARMA') sonarAlarma();
                };
                c.dataChannel = channel;
            };
            if (c.dataChannel) {
                c.dataChannel.onmessage = (e) => {
                    if (e.data === 'ALARMA') sonarAlarma();
                };
            }
        }
        
        c.on('stream', stream => {
            if (audio) audio.pause();
            audio = new Audio();
            audio.srcObject = stream;
            audio.autoplay = true;
        });
        
        c.on('close', () => {
            connected = false;
            document.getElementById('status').innerHTML = '❌ Desconectado';
            if (manosLibresActivo) {
                manosLibresActivo = false;
                document.getElementById('manosLibres').innerHTML = '🎤 MANOS LIBRES (OFF)';
                document.getElementById('manosLibres').classList.remove('activo');
                if (localStream) localStream.getTracks().forEach(t => t.enabled = false);
            }
            document.getElementById('ptt').classList.add('listening');
            document.getElementById('ptt').innerHTML = '🎤<br>PTT (Mantener)';
        });
    }
    
    // Conectar
    document.getElementById('connect').onclick = () => {
        const otherId = document.getElementById('otherId').value.trim();
        if (!otherId) { alert('Escribe el ID'); return; }
        if (!localStream) { alert('Esperando micrófono'); return; }
        document.getElementById('status').innerHTML = '🔄 Conectando...';
        const c = peer.call(otherId, localStream);
        setupCall(c);
    };
    
    // Nombre
    document.getElementById('username').onchange = () => {
        miNombre = document.getElementById('username').value.trim();
        if (miNombre && peer.id) {
            document.getElementById('myId').innerHTML = `📱 TU ID: ${peer.id}<br>📛 ${miNombre}`;
        }
    };
    
    // PTT
    const ptt = document.getElementById('ptt');
    ptt.onmousedown = () => {
        if (connected && localStream && !manosLibresActivo) {
            localStream.getTracks().forEach(t => t.enabled = true);
            ptt.classList.remove('listening');
            ptt.innerHTML = '🎤<br>HABLANDO';
            document.getElementById('status').innerHTML = '🔴 HABLANDO...';
        }
    };
    ptt.onmouseup = () => {
        if (!manosLibresActivo) {
            if (localStream) localStream.getTracks().forEach(t => t.enabled = false);
            ptt.classList.add('listening');
            ptt.innerHTML = '🎤<br>PTT (Mantener)';
            document.getElementById('status').innerHTML = '🎧 Escuchando';
        }
    };
    ptt.onmouseleave = ptt.onmouseup;
    ptt.ontouchstart = (e) => { e.preventDefault(); ptt.onmousedown(); };
    ptt.ontouchend = (e) => { e.preventDefault(); ptt.onmouseup(); };
    
    // Manos libres
    document.getElementById('manosLibres').onclick = () => {
        manosLibresActivo = !manosLibresActivo;
        const btn = document.getElementById('manosLibres');
        if (manosLibresActivo) {
            if (localStream) localStream.getTracks().forEach(t => t.enabled = true);
            btn.innerHTML = '🎤 MANOS LIBRES (ON)';
            btn.classList.add('activo');
            document.getElementById('status').innerHTML = '🎤 Manos libres activado';
        } else {
            if (localStream) localStream.getTracks().forEach(t => t.enabled = false);
            btn.innerHTML = '🎤 MANOS LIBRES (OFF)';
            btn.classList.remove('activo');
            document.getElementById('status').innerHTML = '🎧 Escuchando';
        }
    };
    
    // Alarma
    document.getElementById('alarmaBtn').onclick = () => {
        if (connected) {
            enviarAlarma();
            document.getElementById('status').innerHTML = '🚨 ALARMA ENVIADA';
            setTimeout(() => {
                if (connected) document.getElementById('status').innerHTML = '✅ Conectado';
            }, 2000);
        } else {
            alert('No conectado');
        }
    };
    
    window.onbeforeunload = () => {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (peer) peer.destroy();
    };
</script>
</body>
</html>
