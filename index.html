<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Walkie Talkie - Final</title>
    <style>
        *{user-select:none;-webkit-tap-highlight-color:transparent}
        body{margin:0;min-height:100vh;background:linear-gradient(135deg,#0a0a0f,#1a1a2e);font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;padding:20px}
        .container{max-width:500px;width:100%}
        .walkie{background:#2c2c3e;border-radius:40px;padding:25px;box-shadow:0 20px 40px rgba(0,0,0,.5)}
        h1{text-align:center;color:#ff6b6b;margin:0 0 5px}
        .subtitle{text-align:center;color:#2ed573;font-size:.7rem;margin-bottom:20px}
        .panel{background:#1e1e2a;border-radius:20px;padding:15px;margin-bottom:20px}
        input{width:100%;padding:12px;background:#0a0a0f;border:1px solid #3a3a4a;border-radius:12px;color:white;font-size:1rem;box-sizing:border-box;text-align:center}
        button{width:100%;margin-top:10px;padding:12px;background:#ff6b6b;border:none;border-radius:12px;color:white;font-weight:bold;cursor:pointer}
        .users-list{background:#0a0a0f;border-radius:15px;padding:10px;margin-bottom:15px;max-height:200px;overflow-y:auto}
        .users-title{font-size:.8rem;color:#ff6b6b;margin-bottom:8px;display:flex;justify-content:space-between}
        .user-item{padding:10px;background:#1e1e2a;margin-bottom:6px;border-radius:10px;display:flex;justify-content:space-between}
        .user-name{font-weight:bold}
        .status-badge{padding:2px 8px;border-radius:20px;font-size:.65rem}
        .status-badge.online{background:#2ed57322;color:#2ed573}
        .ptt-button{width:180px;height:180px;border-radius:50%;background:radial-gradient(#e74c3c,#c0392b);border:4px solid #ecf0f1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:1.2rem;font-weight:bold;color:white;margin:20px auto;transition:.05s linear}
        .ptt-button:active{transform:scale(.96)}
        .ptt-button.listening{background:radial-gradient(#34495e,#2c3e50)}
        .status{background:#000000aa;border-radius:15px;padding:15px;text-align:center;margin-top:15px}
        .status-value{font-size:1.2rem;font-weight:bold;display:flex;align-items:center;justify-content:center;gap:10px}
        .status-value.listening{color:#2ed573}
        .status-value.speaking{color:#ff4757}
        .led{width:12px;height:12px;border-radius:50%;animation:pulse 1s infinite}
        .led.listening{background:#2ed573}
        .led.speaking{background:#ff4757}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .info-text{font-size:.7rem;color:#888;text-align:center;margin-top:15px}
        .no-users{text-align:center;color:#666;padding:20px}
        .sync-status{font-size:.7rem;text-align:center;margin-top:10px;padding:5px;border-radius:10px}
        .sync-status.success{background:#2ed57322;color:#2ed573}
        .sync-status.error{background:#ff475722;color:#ff4757}
        .sync-status.waiting{background:#ffa50222;color:#ffa502}
    </style>
</head>
<body>
<div class="container">
    <div class="walkie">
        <h1>📞 WALKIE CASA</h1>
        <div class="subtitle">Línea directa</div>

        <div class="panel">
            <input type="text" id="username" placeholder="Tu nombre" maxlength="20">
            <button id="saveBtn">✅ GUARDAR</button>
            <div class="sync-status waiting" id="syncStatus">📡 Esperando nombre...</div>
        </div>

        <div class="users-list">
            <div class="users-title"><span>📞 CONTACTOS</span><span id="userCount">0</span></div>
            <div id="usersList"><div class="no-users">Esperando contactos...</div></div>
        </div>

        <div id="pttBtn" class="ptt-button listening">🎧<br>ESCUCHANDO</div>

        <div class="status">
            <div class="status-value listening" id="statusVal">
                <span class="led listening"></span>ESCUCHANDO
            </div>
            <div id="activeSpeaker" style="font-size:.8rem;margin-top:5px;color:#ff4757;display:none;"></div>
        </div>
        <div class="info-text">1. Pon tu nombre y GUARDAR<br>2. Aparecerán los contactos<br>3. Mantén el botón ROJO para hablar<br>4. El token va en la URL: ?token=github_pat_XXX</div>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// ============ CAMBIA SOLO ESTAS 2 LÍNEAS ============
const GITHUB_OWNER = 'TU_USUARIO';        // Tu usuario de GitHub
const GITHUB_REPO = 'walkie-test';        // Tu repositorio
// ===================================================

// ============ LECTURA DEL TOKEN ============
let GITHUB_TOKEN = null;

// Leer de la URL
const urlParams = new URLSearchParams(window.location.search);
const tokenFromURL = urlParams.get('token');

if (tokenFromURL && tokenFromURL.startsWith('github_pat')) {
    GITHUB_TOKEN = tokenFromURL;
    localStorage.setItem('github_token', tokenFromURL);
    document.getElementById('syncStatus').innerHTML = '✅ Token cargado';
    document.getElementById('syncStatus').className = 'sync-status success';
} else {
    // Intentar leer de caché
    const cachedToken = localStorage.getItem('github_token');
    if (cachedToken && cachedToken.startsWith('github_pat')) {
        GITHUB_TOKEN = cachedToken;
        document.getElementById('syncStatus').innerHTML = '✅ Token desde caché';
        document.getElementById('syncStatus').className = 'sync-status success';
    } else {
        document.getElementById('syncStatus').innerHTML = '❌ Token no encontrado en URL';
        document.getElementById('syncStatus').className = 'sync-status error';
        document.getElementById('usersList').innerHTML = '<div class="no-users">⚠️ Usa el enlace con ?token=github_pat_XXX</div>';
    }
}

// ============ VARIABLES ============
let peer = null;
let myPeerId = null;
let myUsername = '';
let localStream = null;
let isSpeaking = false;
let currentCall = null;
let audioElement = null;
let currentSpeakerId = null;
let syncInterval = null;
let users = new Map();

// ============ GITHUB FUNCTIONS ============
async function readUsers() {
    if (!GITHUB_TOKEN) return {};
    try {
        const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/usuarios.json`;
        const res = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
        if (res.status === 404) return {};
        if (res.status === 401) {
            localStorage.removeItem('github_token');
            document.getElementById('syncStatus').innerHTML = '❌ Token inválido';
            return {};
        }
        const data = await res.json();
        return JSON.parse(atob(data.content));
    } catch(e) { return {}; }
}

async function saveUsers(data) {
    if (!GITHUB_TOKEN) return;
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    let sha = null;
    try {
        const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/usuarios.json`;
        const res = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
        if (res.ok) sha = (await res.json()).sha;
    } catch(e) {}
    await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/usuarios.json`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: 'update', content, sha })
    });
}

async function syncUsers() {
    if (!myPeerId || !myUsername) return;
    
    const data = await readUsers();
    data[myPeerId] = {
        nombre: myUsername,
        peerId: myPeerId,
        ultimaVez: Date.now(),
        hablando: isSpeaking
    };
    
    // Limpiar usuarios viejos (30 segundos)
    for (let id in data) {
        if (Date.now() - data[id].ultimaVez > 30000) {
            delete data[id];
        }
    }
    
    await saveUsers(data);
    
    // Actualizar lista de usuarios
    const otros = Object.values(data).filter(u => u.peerId !== myPeerId);
    document.getElementById('userCount').innerText = otros.length;
    const listDiv = document.getElementById('usersList');
    if (otros.length === 0) {
        listDiv.innerHTML = '<div class="no-users">No hay otros usuarios conectados</div>';
    } else {
        listDiv.innerHTML = otros.map(u => `
            <div class="user-item">
                <span class="user-name">📞 ${u.nombre}</span>
                <span class="status-badge online">🔵 ONLINE</span>
            </div>
        `).join('');
    }
    
    // Detectar si alguien está hablando
    const alguienHablando = otros.find(u => u.hablando);
    if (alguienHablando && !isSpeaking && currentSpeakerId !== alguienHablando.peerId) {
        if (currentCall) currentCall.close();
        const call = peer.call(alguienHablando.peerId, localStream);
        currentCall = call;
        currentSpeakerId = alguienHablando.peerId;
        call.on('stream', (stream) => {
            if (audioElement) audioElement.pause();
            audioElement = new Audio();
            audioElement.srcObject = stream;
            audioElement.autoplay = true;
        });
        document.getElementById('activeSpeaker').innerHTML = `🎤 ${alguienHablando.nombre} está hablando...`;
        document.getElementById('activeSpeaker').style.display = 'block';
    } else if (!alguienHablando && currentSpeakerId) {
        document.getElementById('activeSpeaker').style.display = 'none';
        currentSpeakerId = null;
    }
}

// ============ PEERJS ============
function initPeer() {
    peer = new Peer({
        host: '0.peerjs.com',
        port: 443,
        secure: true,
        path: '/'
    });
    
    peer.on('open', (id) => {
        myPeerId = id;
        console.log('Peer ID:', id);
        document.getElementById('syncStatus').innerHTML = '✅ Conectado a PeerJS';
        if (syncInterval) clearInterval(syncInterval);
        syncInterval = setInterval(syncUsers, 5000);
        if (myUsername) syncUsers();
    });
    
    peer.on('call', (call) => {
        if (localStream) call.answer(localStream);
    });
    
    peer.on('error', (err) => {
        console.error('Peer error:', err);
    });
}

// ============ PTT ============
async function startSpeaking() {
    if (isSpeaking) return;
    if (!localStream) {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true } });
        } catch(e) {
            alert('Permite el micrófono');
            return;
        }
    }
    
    isSpeaking = true;
    document.getElementById('pttBtn').classList.remove('listening');
    document.getElementById('pttBtn').innerHTML = '🎤<br>HABLANDO';
    document.getElementById('statusVal').classList.remove('listening');
    document.getElementById('statusVal').classList.add('speaking');
    document.getElementById('statusVal').innerHTML = '<span class="led speaking"></span>HABLANDO';
    
    if (currentCall) currentCall.close();
    document.getElementById('activeSpeaker').style.display = 'none';
    await syncUsers();
}

async function stopSpeaking() {
    if (!isSpeaking) return;
    
    isSpeaking = false;
    document.getElementById('pttBtn').classList.add('listening');
    document.getElementById('pttBtn').innerHTML = '🎧<br>ESCUCHANDO';
    document.getElementById('statusVal').classList.add('listening');
    document.getElementById('statusVal').classList.remove('speaking');
    document.getElementById('statusVal').innerHTML = '<span class="led listening"></span>ESCUCHANDO';
    await syncUsers();
}

// ============ GUARDAR NOMBRE ============
async function saveName() {
    const nombre = document.getElementById('username').value.trim();
    if (!nombre) {
        alert('Escribe un nombre');
        return;
    }
    
    myUsername = nombre;
    document.getElementById('syncStatus').innerHTML = '📡 Sincronizando...';
    document.getElementById('syncStatus').className = 'sync-status waiting';
    
    if (!myPeerId) {
        setTimeout(() => saveName(), 500);
        return;
    }
    
    await syncUsers();
    document.getElementById('syncStatus').innerHTML = '✅ Listo';
    document.getElementById('syncStatus').className = 'sync-status success';
}

// ============ EVENTOS ============
document.getElementById('saveBtn').addEventListener('click', saveName);

const pttBtn = document.getElementById('pttBtn');
pttBtn.addEventListener('mousedown', startSpeaking);
pttBtn.addEventListener('mouseup', stopSpeaking);
pttBtn.addEventListener('mouseleave', stopSpeaking);
pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startSpeaking(); });
pttBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopSpeaking(); });

// ============ INICIO ============
// Pedir micrófono
navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => { localStream = stream; })
    .catch(e => console.log('Error micrófono:', e));

initPeer();

// Limpiar al cerrar
window.addEventListener('beforeunload', () => {
    if (syncInterval) clearInterval(syncInterval);
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    if (peer) peer.destroy();
});
</script>
</body>
</html>
