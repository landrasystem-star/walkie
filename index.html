<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Walkie Talkie - WAV Externo</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0f;
            font-family: system-ui, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: #2c2c3e;
            border-radius: 40px;
            padding: 25px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            color: #ff6b6b;
            text-align: center;
            margin: 0 0 20px;
            font-size: 1.8rem;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: none;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input {
            background: #0a0a0f;
            border: 1px solid #3a3a4a;
            color: white;
            text-align: center;
        }

        button {
            background: #ff6b6b;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.05s ease;
        }

        button:active {
            transform: scale(0.97);
        }

        .id-box {
            background: #0a0a0f;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            text-align: center;
            margin: 10px 0;
            word-break: break-all;
            color: #2ed573;
            font-size: 12px;
        }

        .ptt {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(#e74c3c, #c0392b);
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .ptt:active {
            transform: scale(0.95);
        }

        .ptt.listening {
            background: radial-gradient(#34495e, #2c3e50);
        }

        .status {
            text-align: center;
            margin-top: 15px;
            color: #aaa;
            font-size: 0.85rem;
        }

        .manos-libres {
            background: #3498db;
            margin-top: 10px;
        }

        .manos-libres.activo {
            background: #e67e22;
        }

        .alarma {
            background: #e74c3c;
        }

        .botonera {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .seccion-sonido {
            background: #1e1e2e;
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
        }

        .seccion-sonido h3 {
            color: #ffb347;
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            text-align: center;
        }

        .btn-sonido {
            background: #9b59b6;
        }

        .btn-sonido-integrado {
            background: #e67e22;
            margin-bottom: 10px;
        }

        .file-label {
            background: #2c6e9e;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: block;
            margin: 5px 0;
        }

        input[type="file"] {
            display: none;
        }

        .info-wav {
            background: #0a0a0f;
            border-radius: 10px;
            padding: 8px;
            margin-top: 10px;
            font-size: 11px;
            text-align: center;
            color: #888;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📻 WALKIE TALKIE</h1>
    
    <input type="text" id="username" placeholder="Tu nombre">
    <div class="id-box" id="myId">Esperando ID...</div>
    
    <input type="text" id="otherId" placeholder="ID de la otra persona">
    <button id="connect">🔗 CONECTAR</button>
    
    <div class="botonera">
        <div id="ptt" class="ptt listening">🎤<br>PTT<br><span style="font-size:0.6rem;">Mantener</span></div>
        <button id="manosLibres" class="manos-libres">🔊 MANOS LIBRES (OFF)</button>
        <button id="alarmaBtn" class="alarma">🚨 TIMBRE / ALARMA</button>
    </div>

    <div class="seccion-sonido">
        <h3>🎵 ENVÍO DE SONIDOS WAV</h3>
        <button id="sonidoIntegradoBtn" class="btn-sonido-integrado">🎵 ENVIAR MI WAV (sonido.wav)</button>
        <label class="file-label">📁 O selecciona otro archivo WAV/MP3
            <input type="file" id="audioFile" accept="audio/*">
        </label>
        <button id="enviarAudioBtn" class="btn-sonido" disabled>📤 ENVIAR ARCHIVO</button>
        <div class="info-wav">
            💡 Para usar tu propio WAV: ponlo en la misma carpeta con el nombre <strong>sonido.wav</strong>
        </div>
    </div>
    
    <div class="status" id="status">📡 Desconectado</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
    // ============================================
    // CONFIGURACIÓN - CAMBIA ESTO SEGÚN TU WAV
    // ============================================
    const NOMBRE_WAV_EXTERNO = 'sonido.wav';  // 👈 Pon aquí el nombre de tu archivo WAV
    // ============================================
    
    let peer, localStream, call, audio;
    let connected = false;
    let manosLibresActivo = false;
    let miNombre = '';
    let dataChannel = null;
    let archivoSeleccionado = null;
    
    // DOM elements
    const usernameInput = document.getElementById('username');
    const myIdDiv = document.getElementById('myId');
    const otherIdInput = document.getElementById('otherId');
    const connectBtn = document.getElementById('connect');
    const ptt = document.getElementById('ptt');
    const manosLibresBtn = document.getElementById('manosLibres');
    const alarmaBtn = document.getElementById('alarmaBtn');
    const statusSpan = document.getElementById('status');
    const audioFileInput = document.getElementById('audioFile');
    const enviarAudioBtn = document.getElementById('enviarAudioBtn');
    const sonidoIntegradoBtn = document.getElementById('sonidoIntegradoBtn');
    
    // ========== FUNCIONES DE AUDIO ==========
    
    // Alarma que suena SOLO en el walkie que RECIBE (no en el que envía)
    function sonarAlarmaReceptor() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.35;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8);
            osc.stop(audioCtx.currentTime + 0.8);
            audioCtx.resume();
        } catch(e) { console.log("Alarma error:", e); }
    }
    
    // Enviar alarma al otro walkie
    function enviarAlarma() {
        if (dataChannel && dataChannel.readyState === 'open') {
            dataChannel.send(JSON.stringify({ type: 'ALARMA' }));
            statusSpan.innerHTML = '🚨 ¡ALARMA ENVIADA al otro walkie!';
            setTimeout(() => { if(connected) statusSpan.innerHTML = '✅ Conectado'; }, 2000);
        } else {
            statusSpan.innerHTML = '⚠️ No hay canal de datos abierto';
        }
    }
    
    // Enviar archivo de audio (WAV, MP3, etc)
    async function enviarArchivoAudio(blob, nombreArchivo) {
        if (!connected || !dataChannel || dataChannel.readyState !== 'open') {
            statusSpan.innerHTML = '⚠️ No estás conectado al otro walkie';
            return false;
        }
        
        try {
            statusSpan.innerHTML = '📤 Enviando sonido...';
            const arrayBuffer = await blob.arrayBuffer();
            const base64 = btoa(String.fromCharCode(...new Uint8Array(arrayBuffer)));
            const mensaje = JSON.stringify({
                type: 'AUDIO',
                nombre: nombreArchivo,
                data: base64,
                mime: blob.type || 'audio/wav'
            });
            dataChannel.send(mensaje);
            statusSpan.innerHTML = '✅ Sonido enviado correctamente';
            setTimeout(() => { if(connected) statusSpan.innerHTML = '✅ Conectado'; }, 1500);
            return true;
        } catch(err) {
            console.error(err);
            statusSpan.innerHTML = '❌ Error al enviar sonido';
            return false;
        }
    }
    
    // Reproducir audio recibido
    function reproducirAudioRecibido(base64, mimeType, nombre) {
        try {
            const binaryString = atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            const blob = new Blob([bytes], { type: mimeType || 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const audioElem = new Audio(url);
            audioElem.volume = 0.9;
            audioElem.play().catch(e => console.log("Error reproducción:", e));
            statusSpan.innerHTML = `🔊 Reproduciendo: ${nombre}`;
            setTimeout(() => { if(connected) statusSpan.innerHTML = '✅ Conectado'; }, 2000);
        } catch(e) {
            console.error("Error reproduciendo audio:", e);
        }
    }
    
    // ========== PEERJS ==========
    peer = new Peer({ host: '0.peerjs.com', port: 443, secure: true });
    
    peer.on('open', id => {
        myIdDiv.innerHTML = `📱 TU ID: ${id}<br>📛 ${miNombre || 'Sin nombre'}`;
        statusSpan.innerHTML = '✅ Listo. Comparte este ID con la otra persona';
    });
    
    peer.on('call', incoming => {
        if (localStream) {
            incoming.answer(localStream);
            setupCall(incoming);
        }
    });
    
    peer.on('error', err => {
        console.error(err);
        statusSpan.innerHTML = '❌ Error de conexión';
    });
    
    // Obtener micrófono
    navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } })
        .then(stream => { localStream = stream; })
        .catch(e => { console.log('Error micrófono:', e); statusSpan.innerHTML = '❌ Permiso de micrófono denegado'; });
    
    function setupCall(c) {
        call = c;
        connected = true;
        statusSpan.innerHTML = '✅ Conectado - Escuchando';
        
        // Configurar canal de datos para alarmas y sonidos
        if (c.peerConnection) {
            c.peerConnection.ondatachannel = (event) => {
                dataChannel = event.channel;
                dataChannel.onmessage = (e) => manejarMensajeCanal(e);
            };
        }
        
        if (c.dataChannel) {
            dataChannel = c.dataChannel;
            dataChannel.onmessage = (e) => manejarMensajeCanal(e);
        } else {
            try {
                const dc = c.peerConnection.createDataChannel('walkieChannel');
                dc.onmessage = (e) => manejarMensajeCanal(e);
                dataChannel = dc;
            } catch(e) { console.log("Error creando canal:", e); }
        }
        
        c.on('stream', stream => {
            if (audio) audio.pause();
            audio = new Audio();
            audio.srcObject = stream;
            audio.autoplay = true;
        });
        
        c.on('close', () => {
            connected = false;
            statusSpan.innerHTML = '❌ Desconectado';
            dataChannel = null;
            if (manosLibresActivo) {
                manosLibresActivo = false;
                manosLibresBtn.innerHTML = '🔊 MANOS LIBRES (OFF)';
                manosLibresBtn.classList.remove('activo');
                if (localStream) localStream.getTracks().forEach(t => t.enabled = false);
            }
            ptt.classList.add('listening');
            ptt.innerHTML = '🎤<br>PTT<br><span style="font-size:0.6rem;">Mantener</span>';
        });
    }
    
    function manejarMensajeCanal(event) {
        try {
            const msg = JSON.parse(event.data);
            if (msg.type === 'ALARMA') {
                sonarAlarmaReceptor();
                statusSpan.innerHTML = '🚨 ¡ALARMA RECIBIDA!';
                setTimeout(() => { if(connected) statusSpan.innerHTML = '✅ Conectado'; }, 1500);
            } else if (msg.type === 'AUDIO') {
                reproducirAudioRecibido(msg.data, msg.mime, msg.nombre);
            }
        } catch(e) {
            console.log("Mensaje no JSON:", event.data);
        }
    }
    
    // ========== CONTROLES UI ==========
    
    connectBtn.onclick = () => {
        const otherId = otherIdInput.value.trim();
        if (!otherId) { alert('Escribe el ID del otro walkie'); return; }
        if (!localStream) { alert('Esperando permiso de micrófono...'); return; }
        statusSpan.innerHTML = '🔄 Conectando...';
        const c = peer.call(otherId, localStream);
        setupCall(c);
    };
    
    usernameInput.onchange = () => {
        miNombre = usernameInput.value.trim();
        if (miNombre && peer && peer.id) {
            myIdDiv.innerHTML = `📱 TU ID: ${peer.id}<br>📛 ${miNombre}`;
        }
    };
    
    // PTT (Push to Talk)
    ptt.onmousedown = () => {
        if (connected && localStream && !manosLibresActivo) {
            localStream.getTracks().forEach(t => t.enabled = true);
            ptt.classList.remove('listening');
            ptt.innerHTML = '🔴<br>HABLANDO<br><span style="font-size:0.6rem;">Suelta para escuchar</span>';
            statusSpan.innerHTML = '🔴 Transmitiendo...';
        }
    };
    ptt.onmouseup = () => {
        if (!manosLibresActivo && localStream) {
            localStream.getTracks().forEach(t => t.enabled = false);
            ptt.classList.add('listening');
            ptt.innerHTML = '🎤<br>PTT<br><span style="font-size:0.6rem;">Mantener</span>';
            statusSpan.innerHTML = '🎧 Escuchando...';
        }
    };
    ptt.onmouseleave = ptt.onmouseup;
    ptt.ontouchstart = (e) => { e.preventDefault(); ptt.onmousedown(); };
    ptt.ontouchend = (e) => { e.preventDefault(); ptt.onmouseup(); };
    
    // Manos libres
    manosLibresBtn.onclick = () => {
        if (!connected) { alert('Primero conecta con otro walkie'); return; }
        manosLibresActivo = !manosLibresActivo;
        if (manosLibresActivo) {
            if (localStream) localStream.getTracks().forEach(t => t.enabled = true);
            manosLibresBtn.innerHTML = '🎙️ MANOS LIBRES (ON)';
            manosLibresBtn.classList.add('activo');
            statusSpan.innerHTML = '🎤 Manos libres activado - siempre transmitiendo';
        } else {
            if (localStream) localStream.getTracks().forEach(t => t.enabled = false);
            manosLibresBtn.innerHTML = '🔊 MANOS LIBRES (OFF)';
            manosLibresBtn.classList.remove('activo');
            statusSpan.innerHTML = '🎧 Modo PTT - usa el botón central';
        }
    };
    
    // Alarma (solo al otro walkie, no suena localmente)
    alarmaBtn.onclick = () => {
        if (connected) enviarAlarma();
        else alert('No estás conectado a ningún walkie');
    };
    
    // ========== ENVÍO DE SONIDOS ==========
    
    // Botón de sonido integrado (carga el WAV externo)
    sonidoIntegradoBtn.onclick = async () => {
        if (!connected) {
            statusSpan.innerHTML = '⚠️ Conecta primero al otro walkie';
            return;
        }
        
        try {
            statusSpan.innerHTML = `📂 Cargando ${NOMBRE_WAV_EXTERNO}...`;
            const respuesta = await fetch(NOMBRE_WAV_EXTERNO);
            if (!respuesta.ok) {
                throw new Error(`No se encontró el archivo "${NOMBRE_WAV_EXTERNO}" en la misma carpeta`);
            }
            const blob = await respuesta.blob();
            await enviarArchivoAudio(blob, NOMBRE_WAV_EXTERNO);
        } catch(err) {
            console.error(err);
            statusSpan.innerHTML = `❌ Error: No encuentro "${NOMBRE_WAV_EXTERNO}". ¿Está en la misma carpeta?`;
        }
    };
    
    // Seleccionar archivo manual
    audioFileInput.onchange = (e) => {
        if (e.target.files.length > 0) {
            archivoSeleccionado = e.target.files[0];
            enviarAudioBtn.disabled = false;
            statusSpan.innerHTML = `📁 Archivo listo: ${archivoSeleccionado.name}`;
        } else {
            archivoSeleccionado = null;
            enviarAudioBtn.disabled = true;
        }
    };
    
    enviarAudioBtn.onclick = async () => {
        if (!connected) { alert('Conecta primero'); return; }
        if (archivoSeleccionado) {
            await enviarArchivoAudio(archivoSeleccionado, archivoSeleccionado.name);
        } else {
            statusSpan.innerHTML = '📁 Selecciona un archivo primero';
        }
    };
    
    // Inicializar nombre por defecto
    usernameInput.value = 'WalkieUser';
    miNombre = 'WalkieUser';
    
    // Limpiar al cerrar
    window.onbeforeunload = () => {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (peer) peer.destroy();
    };
</script>
</body>
</html>
